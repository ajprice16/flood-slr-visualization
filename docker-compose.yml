
services:
  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    image: slr-backend:latest
    container_name: slr-backend
    depends_on:
      - redis
    volumes:
      - ./Backend/dem:/app/dem:ro
      - ./Backend/wp_2020:/app/wp_2020:ro
      - ./Backend/tile_cache:/app/tile_cache
      - ./Backend/data:/app/data:ro
    environment:
      - TILE_CACHE_SIZE=${TILE_CACHE_SIZE:-2048}
      - UVICORN_WORKERS=${UVICORN_WORKERS:-12}
      - UVICORN_KEEPALIVE=${UVICORN_KEEPALIVE:-15}
      - GDAL_CACHEMAX=${GDAL_CACHEMAX:-2048}
      - GDAL_NUM_THREADS=${GDAL_NUM_THREADS:-8}
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-8}
      - TRUSTED_HOSTS=${TRUSTED_HOSTS:-localhost,127.0.0.1,gateway,caddy}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-http://localhost,http://127.0.0.1}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '12'
          memory: 48g
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    networks:
      slr-net:
        aliases:
          - backend

  frontend:
    build:
      context: .
      dockerfile: Frontend/Dockerfile
    image: slr-frontend:latest
    container_name: slr-frontend
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256m
    restart: unless-stopped
    networks:
      slr-net:
        aliases:
          - frontend

  gateway:
    build:
      context: .
      dockerfile: Gateway/Dockerfile
    image: slr-gateway:latest
    container_name: slr-gateway
    ports:
      - "${GATEWAY_PORT_BIND:-80:80}"
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512m
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    networks:
      slr-net:
        aliases:
          - gateway

  redis:
    image: redis:7-alpine
    container_name: slr-redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512m
    networks:
      slr-net:
        aliases:
          - redis

networks:
  slr-net:
    driver: bridge
