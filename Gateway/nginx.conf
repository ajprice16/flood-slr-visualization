server {
  listen 80;
  server_name _;

  # Proxy API to FastAPI backend
  location /api/ {
    resolver 127.0.0.11 ipv6=off;
    proxy_pass http://backend:8000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Block dev-only source paths to avoid SPA fallback returning HTML
  # This prevents MIME type mismatch when the page tries to load /src/*.jsx
  location ^~ /src/ {
    return 404;
  }

  # Ensure built assets are proxied directly to frontend static handler
  location ^~ /assets/ {
    resolver 127.0.0.11 ipv6=off;
    proxy_pass http://frontend:80;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  # Everything else to the frontend (already serving SPA)
  location / {
    resolver 127.0.0.11 ipv6=off;
    # Avoid path rewrite loops: no trailing slash on proxy_pass
    proxy_pass http://frontend:80;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }
}
