# Per-IP rate limit for API requests (30 req/s with short burst).
limit_req_zone $binary_remote_addr zone=api_rate:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=analysis_rate:10m rate=5r/s;

server {
  listen 80;
  server_name _;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; connect-src 'self' https: http:; font-src 'self' data: https:; worker-src blob:; frame-ancestors 'none';" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # Tighter rate limit for expensive analysis endpoint
  location /api/analyze_region {
    limit_req zone=analysis_rate burst=10 nodelay;
    resolver 127.0.0.11 ipv6=off;
    proxy_pass http://backend:8000/analyze_region;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Proxy API to FastAPI backend
  location /api/ {
    limit_req zone=api_rate burst=60 nodelay;
    resolver 127.0.0.11 ipv6=off;
    proxy_pass http://backend:8000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Block dev-only source paths to avoid SPA fallback returning HTML
  # This prevents MIME type mismatch when the page tries to load /src/*.jsx
  location ^~ /src/ {
    return 404;
  }

  # Ensure built assets are proxied directly to frontend static handler
  location ^~ /assets/ {
    resolver 127.0.0.11 ipv6=off;
    set $frontend_upstream frontend:80;
    proxy_pass http://$frontend_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  # Everything else to the frontend (already serving SPA)
  location / {
    resolver 127.0.0.11 ipv6=off;
    # Avoid path rewrite loops: no trailing slash on proxy_pass
    set $frontend_upstream frontend:80;
    proxy_pass http://$frontend_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }
}
