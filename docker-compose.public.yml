services:
  caddy:
    build:
      context: .
      dockerfile: deploy/Dockerfile.caddy
    image: slr-caddy:latest
    container_name: slr-caddy
    depends_on:
      - gateway
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CF_API_TOKEN=${CF_API_TOKEN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks:
      slr-net:
        aliases:
          - caddy

volumes:
  caddy_data:
  caddy_config:
