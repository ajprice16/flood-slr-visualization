services:
  caddy:
    image: caddy:2-alpine
    container_name: slr-caddy
    depends_on:
      - gateway
    ports:
      - "80:80"
      - "443:443"
    environment:
      - SITE_HOSTNAME=${SITE_HOSTNAME}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      slr-net:
        aliases:
          - caddy

volumes:
  caddy_data:
  caddy_config:
