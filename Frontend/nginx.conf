server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # index.html must never be cached so browsers always get the latest entry point
  location = /index.html {
    add_header Cache-Control "public, max-age=0, must-revalidate" always;
    try_files /index.html =404;
  }

  # Vite outputs content-hashed filenames under /assets — cache aggressively
  location ^~ /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  # Other static files (favicons, robots.txt, etc.) — short cache
  location ~* \.(ico|txt|json|webmanifest)$ {
    add_header Cache-Control "public, max-age=86400" always;
    try_files $uri =404;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
